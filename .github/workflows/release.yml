name: release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: stefanprodan/timoni/actions/setup@69e421aebbed979ded721df0da2a54428c5b4b9c # v0.27.0

      - name: Log in to ghcr.io
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | timoni registry login ghcr.io -u ${GITHUB_ACTOR} --password-stdin

      - name: Resolve version + latest flag
        id: version
        run: |
          version="${GITHUB_REF_NAME}"
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT
          if [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "latest_flag=--latest" >> $GITHUB_OUTPUT
          else
            echo "latest_flag=" >> $GITHUB_OUTPUT
          fi

      - name: Push and sign module
        run: |
          timoni mod push ./modules/ory-talos \
            "oci://ghcr.io/${OWNER}/modules/ory-talos" \
            --version "${VERSION}" \
            ${LATEST_FLAG} \
            -a 'org.opencontainers.image.licenses=Apache-2.0' \
            -a 'org.opencontainers.image.source=https://github.com/${{ github.repository }}' \
            -a 'org.opencontainers.image.description=Ory Talos OSS timoni module.' \
            --sign=cosign
        env:
          OWNER: ${{ steps.version.outputs.owner }}
          VERSION: ${{ steps.version.outputs.version }}
          LATEST_FLAG: ${{ steps.version.outputs.latest_flag }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          prerelease_flag=""
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --generate-notes \
            ${prerelease_flag}
