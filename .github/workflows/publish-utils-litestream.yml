name: publish utils/litestream

# Publishes the utils/litestream CUE module to the CUE Central Registry
# (registry.cue.works) when a tag like utils/litestream/v0.1.0 is pushed.
# Authentication uses GitHub OIDC.
on:
  push:
    tags:
      - 'utils/litestream/v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: utils/litestream
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: cue-lang/setup-cue@a93fa358375740cd8b0078f76355512b9208acb1 # v1.0.1
        with:
          version: v0.15.0

      - name: Resolve version
        id: version
        working-directory: .
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          # tag is utils/litestream/vX.Y.Z — strip the prefix
          v="${REF_NAME#utils/litestream/}"

          if [[ ! "${v}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::version '${v}' is not a valid semver vX.Y.Z"
            exit 1
          fi
          echo "version=${v}" >> "$GITHUB_OUTPUT"

      - run: cue mod tidy

      - name: Verify no diff after tidy
        run: |
          if ! git diff --quiet -- .; then
            echo "::error::cue mod tidy produced changes — commit them before tagging"
            git --no-pager diff -- .
            exit 1
          fi

      - run: cue vet ./litestream/...

      - uses: cue-labs/registry-login-action@66d40052b0206031343e17173425fa10508968d0 # v1.0.3

      - env:
          VERSION: ${{ steps.version.outputs.version }}
        run: cue mod publish "${VERSION}"
