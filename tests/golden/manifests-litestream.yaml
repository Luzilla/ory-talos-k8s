apiVersion: v1
data:
  config.yaml: |
    serve:
      http:
        host: 0.0.0.0
        port: 4420
        request_log:
          exclude_health_endpoints: true
        cors:
          enabled: true
          allowed_origins:
            - http://localhost:3001
          allowed_methods:
            - GET
            - POST
            - PUT
            - DELETE
            - PATCH
          allowed_headers:
            - Content-Type
            - Authorization
          exposed_headers:
            - Content-Type
          allow_credentials: true
          max_age: 86400
          debug: false
    credentials:
      api_keys:
        default_ttl: 720h
        max_ttl: 8760h
        prefix:
          current: talos
          retired: []
      derived_tokens:
        default_ttl: 1h
        jwt:
          signing_keys:
            urls:
              - base64:
        macaroon:
          prefix:
            current: mc
            retired: []
      issuer: https://api.talos.local
    db:
      dsn: sqlite3:///var/lib/talos/talos.db?_journal_mode=WAL
    log:
      level: info
      format: json
    secrets:
      hmac:
        current: docker-compose-hmac-secret-minimum-32-chars-long
        retired: []
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: ory-talos
  name: ory-talos-config
  namespace: ory-talos
---
apiVersion: v1
kind: Secret
metadata:
  labels:
    app.kubernetes.io/name: ory-talos
  name: ory-talos-jwks
  namespace: ory-talos
stringData:
  jwks.json: |-
    {
      "keys": [
        {
          "kty": "RSA",
          "kid": "test-key-1",
          "use": "sig",
          "alg": "RS256",
          "n": "0vx7agoebGcQSuuPiLJXZptN9nndrQmbXEps2aiAFbWhM78LhWx4cbbfAAtVT86zwu1RK7aPFFxuhDR1L6tSoc_BJECPebWKRXjBZCiFV4n3oknjhMstn64tZ_2W-5JsGY4Hc5n9yBXArwl93lqt7_RN5w6Cf0h4QyQ5v-65YGjQR0_FDW2QvzqY368QQMicAtaSqzs8KJZgnYb9c7d0zgdAZHzu6qMQvRL5hajrn1n91CbOpbISD08qNLyrdkt-bFTWhAI4vMQFh6WeZu0fM4lFd2NcRwr3XPksINHaQ-G_xBniIqbw0Ls1jF44-csFCur-kEgU8awapJzKnqDKgw",
          "e": "AQAB"
        }
      ]
    }
type: Opaque
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: ory-talos
  name: ory-talos
  namespace: ory-talos
spec:
  ports:
    - name: http
      port: 4420
      protocol: TCP
      targetPort: 4420
  selector:
    app.kubernetes.io/name: ory-talos
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: ory-talos
  name: ory-talos-headless
  namespace: ory-talos
spec:
  clusterIP: None
  ports:
    - name: http
      port: 4420
      protocol: TCP
      targetPort: 4420
  selector:
    app.kubernetes.io/name: ory-talos
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/name: ory-talos
  name: ory-talos
  namespace: ory-talos
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ory-talos
  serviceName: ory-talos-headless
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ory-talos
    spec:
      automountServiceAccountToken: false
      containers:
        - args:
            - serve
            - --config
            - /etc/talos/config.yaml
          image: oryd/talos:v26.2.0@sha256:4bf9171a8da1ec75e05d6aa6e79afb8c7b5addb045e09b20c07c27f802795fb9
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 5
            httpGet:
              path: /health/alive
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          name: backend
          ports:
            - containerPort: 4420
              name: http
              protocol: TCP
          readinessProbe:
            failureThreshold: 5
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_BIND_SERVICE
              drop:
                - ALL
            privileged: false
          volumeMounts:
            - mountPath: /etc/talos/config.yaml
              name: config
              readOnly: true
              subPath: config.yaml
            - mountPath: /etc/talos/jwks.json
              name: jwks
              readOnly: true
              subPath: jwks.json
            - mountPath: /var/lib/talos
              name: data
      initContainers:
        - args:
            - restore
            - -config
            - /etc/litestream/litestream.yml
            - -if-db-not-exists
            - -if-replica-exists
            - /var/lib/talos/talos.db
          envFrom:
            - secretRef:
                name: ory-talos-litestream-creds
          image: litestream/litestream:0.5.14@sha256:ef0ac5958cf81725b7a85fb76f82ef71ace030db9429086eeefc59ee6ca53941
          imagePullPolicy: IfNotPresent
          name: litestream-restore
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add: []
              drop:
                - ALL
            privileged: false
          volumeMounts:
            - mountPath: /var/lib/talos
              name: data
            - mountPath: /etc/litestream
              name: litestream-config
              readOnly: true
        - args:
            - migrate
            - up
          command:
            - talos
          env:
            - name: DB_DSN
              value: sqlite3:///var/lib/talos/talos.db?_journal_mode=WAL
          image: oryd/talos:v26.2.0@sha256:4bf9171a8da1ec75e05d6aa6e79afb8c7b5addb045e09b20c07c27f802795fb9
          imagePullPolicy: IfNotPresent
          name: db-init
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_BIND_SERVICE
              drop:
                - ALL
            privileged: false
          volumeMounts:
            - mountPath: /var/lib/talos
              name: data
        - args:
            - replicate
            - -config
            - /etc/litestream/litestream.yml
          envFrom:
            - secretRef:
                name: ory-talos-litestream-creds
          image: litestream/litestream:0.5.14@sha256:ef0ac5958cf81725b7a85fb76f82ef71ace030db9429086eeefc59ee6ca53941
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          name: litestream
          ports:
            - containerPort: 9090
              name: metrics
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          restartPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add: []
              drop:
                - ALL
            privileged: false
          volumeMounts:
            - mountPath: /var/lib/talos
              name: data
            - mountPath: /etc/litestream
              name: litestream-config
              readOnly: true
      volumes:
        - configMap:
            name: ory-talos-config
          name: config
        - name: jwks
          secret:
            secretName: ory-talos-jwks
        - configMap:
            name: ory-talos-litestream-config
          name: litestream-config
  volumeClaimTemplates:
    - metadata:
        labels:
          app.kubernetes.io/managed-by: timoni
          app.kubernetes.io/name: ory-talos
          app.kubernetes.io/version: 0.0.0-devel
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
data:
  litestream.yml: |
    addr: :9090
    snapshot:
      interval: 24h
      retention: 72h
    dbs:
      - path: /var/lib/talos/talos.db
        replica:
          endpoint: https://s3.example.org
          type: s3
          bucket: talos-backups-dev
          path: ory/talos
          region: eu-central-1
          force-path-style: true
          sync-interval: 1s
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/name: ory-talos
  name: ory-talos-litestream-config
  namespace: ory-talos
---
apiVersion: v1
kind: Secret
metadata:
  labels:
    app.kubernetes.io/name: ory-talos
  name: ory-talos-litestream-creds
  namespace: ory-talos
stringData:
  AWS_ACCESS_KEY_ID: AKIAEXAMPLE
  AWS_SECRET_ACCESS_KEY: test-secret
type: Opaque
---

